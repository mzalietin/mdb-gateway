spring:
  application:
    name: mdb-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: movie-api
              uri: http://localhost:8081
              predicates:
                - Path=/api/movies, /api/movies/**
            - id: movie-review-api
              uri: http://localhost:8082
              predicates:
                - Path=/api/movie-reviews, /api/movie-reviews/**
            - id: user-api
              uri: http://localhost:8083
              predicates:
                - Path=/api/users, /api/users/**
